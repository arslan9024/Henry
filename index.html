<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Henry | White Caves Doc Hub</title>

    <!-- Phase-1 typography: Inter (variable axis weight 400-700) via Google Fonts.
         Self-hosting is tracked as a follow-up; this is the stage-one ship. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />

    <!-- Avoid a flash of light theme on dark-mode users by resolving theme
         BEFORE React hydrates. Mirrors the logic in src/hooks/useTheme.js. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('henry.ui.theme');
          var mode = ['light', 'dark', 'system'].indexOf(stored) >= 0 ? stored : 'system';
          var resolved =
            mode === 'system'
              ? window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
